
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجندة م. عبدالمحسن اللويم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; --sidebar-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --border-color: #1e293b; --card-bg: #ffffff; --card-border: #e2e8f0; --accent-color: #f8fafc;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #3b82f6;
            --grad-primary: linear-gradient(135deg, #1e293b, #475569);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--sidebar-bg); border-left: 1px solid var(--card-border); padding: 30px 20px; display: flex; flex-direction: column; z-index: 10; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h2 { font-size: 1.4rem; color: var(--border-color); font-weight: 900; line-height: 1.3;}
        .nav-btn { background: transparent; color: var(--text-main); border: 1.5px solid transparent; padding: 12px 15px; border-radius: 14px; cursor: pointer; text-align: right; font-weight: 800; margin-bottom: 8px; width: 100%; transition: 0.2s; }
        .nav-btn:hover { background-color: var(--accent-color); transform: translateX(-4px); }
        .nav-btn.active { background-color: var(--border-color); color: var(--bg-color); }
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .card-header h3 { font-size: 1.2rem; color: var(--border-color); font-weight: 900; margin-bottom: 15px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px; }
        
        ul.data-list { list-style: none; }
        ul.data-list li { padding: 15px; border: 1px solid var(--card-border); border-radius: 14px; margin-bottom: 12px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .item-title { font-weight: 900; margin-bottom: 4px; color: var(--border-color); font-size: 1.05rem;}
        .item-meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; line-height: 1.5;}
        .badge { padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: 900; border: 1px solid var(--border-color); display:inline-block; }
        .badge-success { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.1); }
        
        .history-section { margin-top: 20px; border-top: 2px dashed var(--card-border); padding-top: 20px; }
        
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 75px; flex-direction: row; position: fixed; bottom: 0; overflow-x: auto; padding: 5px; }
            .brand { display: none; }
            .nav-btn { flex: 0 0 auto; text-align: center; padding: 10px 18px; border-radius: 20px; }
            .main-content { padding: 15px; padding-bottom: 90px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <h2>أجندة<br>م. عبدالمحسن اللويم</h2>
            <p id="live-time">جاري التحميل...</p>
        </div>
        <button class="nav-btn active" onclick="switchTab('tab-dashboard')">📊 المؤشرات</button>
        <button class="nav-btn" onclick="switchTab('tab-active')">🟢 المهام القائمة</button>
        <button class="nav-btn" onclick="switchTab('tab-history')">🏛️ البيانات التاريخية (الأرشيف)</button>
    </aside>

    <main class="main-content">
        <div id="tab-dashboard" class="tab-content active">
            <div class="card-grid">
                <div class="card">
                    <div class="card-header"><h3>ملخص إنجازات الموقع</h3></div>
                    <canvas id="activityChart" style="height: 250px;"></canvas>
                </div>
            </div>
        </div>

        <div id="tab-active" class="tab-content">
            <div class="card-grid">
                <div class="card">
                    <div class="card-header"><h3>قرارات ومعاملات قيد التنفيذ</h3></div>
                    <ul class="data-list" id="active-list"></ul>
                </div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="card-grid">
                <div class="card" style="grid-column: 1 / -1;">
                    <div class="card-header"><h3>🏛️ السجل التاريخي للأعمال المنجزة</h3></div>
                    <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: bold; margin-bottom: 15px;">
                        يحتوي هذا السجل على كافة القرارات والمعاملات التي تم إغلاقها، مرتبة كمرجع تاريخي.
                    </p>
                    <ul class="data-list" id="history-list"></ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        // حقن البيانات من بايثون مباشرة (Hardcoded Data)
        const dbData = {"sysMeetings": [], "sysRouting": [], "sysActions": [], "sysDocs": [], "sysContacts": []};

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('live-time').textContent = now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        updateTime();

        function renderData() {
            const activeList = document.getElementById('active-list');
            const historyList = document.getElementById('history-list');
            let activeCount = 0; let historyCount = 0; let docsCount = dbData.sysDocs ? dbData.sysDocs.length : 0;

            // تصفية المعاملات (Routing)
            if(dbData.sysRouting) {
                dbData.sysRouting.forEach(r => {
                    if(r.completed) {
                        historyList.innerHTML += `<li><div class="item-details"><div class="item-title">${r.title}</div><div class="item-meta">أُنجزت في: ${r.dept} | تاريخ الإرسال: ${r.date}</div></div><span class="badge badge-success">معاملة منجزة</span></li>`;
                        historyCount++;
                    } else {
                        activeList.innerHTML += `<li><div class="item-details"><div class="item-title">${r.title}</div><div class="item-meta">عالقة في: ${r.dept}</div></div></li>`;
                        activeCount++;
                    }
                });
            }

            // تصفية القرارات (Actions)
            if(dbData.sysActions) {
                dbData.sysActions.forEach(a => {
                    if(a.completed) {
                        historyList.innerHTML += `<li><div class="item-details"><div class="item-title">${a.desc}</div><div class="item-meta">نفذها: ${a.person} | التاريخ: ${a.date}</div></div><span class="badge badge-success">قرار مُنفذ</span></li>`;
                        historyCount++;
                    } else {
                        activeList.innerHTML += `<li><div class="item-details"><div class="item-title">${a.desc}</div><div class="item-meta">المسؤول: ${a.person}</div></div></li>`;
                        activeCount++;
                    }
                });
            }

            // رسم المخطط
            const ctx = document.getElementById('activityChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['المهام القائمة', 'الأرشيف التاريخي المنجز', 'المستندات'],
                    datasets: [{ data: [activeCount, historyCount, docsCount], backgroundColor: ['#f59e0b', '#10b981', '#3b82f6'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        window.onload = () => { renderData(); };
    </script>
</body>
</html>
